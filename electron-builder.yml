appId: com.valt.drathos
productName: Drathos
copyright: Copyright © 2025 Valt

directories:
  output: dist
  buildResources: build

files:
  - dist-electron/**/*
  - resources/**/*
  - "!**/*.{ts,tsx,map}"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"
  - "!**/nul"
  - "!src"
  - "!.vite"
  - "!forge.config.js"
  - "!vite.*.config.mjs"
  - "!electron.vite.config.mjs"

asarUnpack:
  - "**/*.node"
  - "**/node_modules/7zip-bin/**/*"
  - "**/resources/**/*"

win:
  target:
    - nsis
    - zip
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Drathos
  perMachine: false
  allowElevation: true
  runAfterFinish: true
  deleteAppDataOnUninstall: true
  include: build/installer.nsh

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
    - target: pacman
      arch:
        - x64
    - target: snap
      arch:
        - x64
  category: Game
  icon: build/icon.png
  maintainer: "Valt <contact@drathos.gg>"
  synopsis: "Client de bibliothèque de jeux DRM-free"
  description: "Drathos est un client moderne pour gérer votre bibliothèque de jeux DRM-free. Téléchargez, installez et lancez vos jeux facilement."
  artifactName: ${productName}-${version}-${arch}.${ext}
  executableName: drathos
  vendor: Valt
  packageCategory: games
  desktop:
    entry:
      StartupWMClass: drathos
      StartupNotify: "true"

snap:
  summary: "Client de bibliothèque de jeux DRM-free"
  grade: stable
  confinement: strict
  plugs:
    - browser-support
    - network
    - home
    - opengl
    - pulseaudio
    - x11

rpm:
  compression: gz
  fpm:
    - "--rpm-rpmbuild-define=_build_id_links none"

mac:
  target:
    - dmg
  category: public.app-category.games
  icon: build/icon.icns
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

publish: null
