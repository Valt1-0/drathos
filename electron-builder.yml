appId: com.valt.drathos
productName: Drathos
copyright: Copyright © 2026 Valt

directories:
  output: dist
  buildResources: build

files:
  - dist-electron/**/*
  - resources/**/*
  - "!**/*.{ts,tsx,map}"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"
  - "!**/nul"
  - "!src"
  - "!.vite"
  - "!forge.config.js"
  - "!vite.*.config.mjs"
  - "!electron.vite.config.mjs"

asarUnpack:
  - "**/*.node"
  - "**/node_modules/7zip-bin/**/*"
  - "**/resources/**/*"

win:
  target:
    - nsis
    - zip
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Drathos
  perMachine: false
  allowElevation: true
  runAfterFinish: true
  deleteAppDataOnUninstall: true
  include: build/installer.nsh

linux:
  target:
    - AppImage
    - deb
    - pacman
  category: Game
  icon: build/icon_linux_512.png
  maintainer: "Valt"
  synopsis: "DRM-free game library client"
  description: "Drathos is a modern client to manage your DRM-free game library. Download, install and launch your games easily."
  artifactName: ${productName}-${version}-${arch}.${ext}
  executableName: drathos
  # Names the .desktop after executableName so it matches StartupWMClass and
  # Electron's app_id — lets desktop environments link the running window to the
  # launcher icon (the Linux equivalent of the Windows AppUserModelID fix).
  syncDesktopName: true
  vendor: Valt
  packageCategory: games
  desktop:
    entry:
      StartupWMClass: drathos
      StartupNotify: "true"

snap:
  summary: "Client de bibliothèque de jeux DRM-free"
  grade: stable
  confinement: strict
  plugs:
    - browser-support
    - network
    - home
    - opengl
    - pulseaudio
    - x11

rpm:
  compression: xz
  fpm:
    - "--rpm-rpmbuild-define=_build_id_links none"

mac:
  target:
    - dmg
  category: public.app-category.games
  icon: build/icon.icns
  artifactName: ${productName}-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

publish:
  provider: github
  owner: Valt1-0
  repo: drathos
  # public repo — no GH_TOKEN needed for auto-update reads
  # GH_TOKEN is only required at release time (npm run release)

