name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: drathos/package-lock.json

      - name: Install dependencies
        run: |
          cd drathos
          npm ci

      - name: Clean problematic files (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd drathos
          find node_modules/7zip-bin -name "nul" -type f -delete 2>/dev/null || true
          echo "✅ Cleaned problematic files"

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          cd drathos
          npm run dist:win

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |
          cd drathos
          npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd drathos
          npm run dist:linux

      - name: List build outputs
        run: |
          cd drathos/dist
          ls -lah || dir
          echo "📦 Build artifacts created"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drathos-${{ matrix.os }}-${{ github.sha }}
          path: |
            drathos/dist/*.exe
            drathos/dist/*.dmg
            drathos/dist/*.AppImage
            drathos/dist/*.deb
            drathos/dist/*.zip
          if-no-files-found: ignore
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            drathos/dist/*.exe
            drathos/dist/*.dmg
            drathos/dist/*.AppImage
            drathos/dist/*.deb
            drathos/dist/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
