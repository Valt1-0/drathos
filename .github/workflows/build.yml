name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libarchive-tools
          echo "✅ System dependencies installed"

      - name: Install npm dependencies
        run: |
          npm ci --legacy-peer-deps
          echo "✅ Dependencies installed"

      - name: Clean problematic files (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $nulFiles = Get-ChildItem -Path "node_modules\7zip-bin" -Filter "nul" -Recurse -ErrorAction SilentlyContinue
          foreach ($file in $nulFiles) {
            Remove-Item -Path $file.FullName -Force -ErrorAction SilentlyContinue
            Write-Host "Removed: $($file.FullName)"
          }
          if ($nulFiles.Count -eq 0) {
            Write-Host "No problematic 'nul' files found"
          }
          Write-Host "✅ Cleaned problematic files"

      - name: Clean problematic files (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          find node_modules/7zip-bin -name "nul" -type f -delete 2>/dev/null || true
          echo "✅ Cleaned problematic files"

      - name: Build application
        run: npm run dist:${{ matrix.platform }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - name: Create Arch Linux package with makepkg
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # Install makepkg dependencies
          sudo apt-get update
          sudo apt-get install -y binutils fakeroot zstd

          cd dist
          if ls *.pacman 1> /dev/null 2>&1; then
            for f in *.pacman; do
              pkgname="drathos"
              pkgver="1.0.0"
              arch="x86_64"

              echo "🔄 Creating Arch package from $f"

              # Extract the .pacman file
              mkdir -p pkg
              bsdtar -xf "$f" -C pkg

              # Create PKGBUILD directory
              mkdir -p build-arch
              cd build-arch

              # Generate PKGBUILD
              cat > PKGBUILD <<EOF
          # Maintainer: Valt <contact@drathos.gg>
          pkgname=${pkgname}
          pkgver=${pkgver}
          pkgrel=1
          pkgdesc="Client de bibliothèque de jeux DRM-free"
          arch=('x86_64')
          url="https://github.com/Valt1-0/drathos"
          license=('custom')
          depends=('gtk3' 'nss' 'alsa-lib')
          options=('!strip' '!emptydirs')

          package() {
            # Copy all files from extracted package
            cp -r "\${srcdir}"/../pkg/* "\${pkgdir}/"
          }
          EOF

              # Create the package
              echo "📦 Building package with makepkg..."
              PKGEXT='.pkg.tar.zst' makepkg --nodeps --skipinteg --skipchecksums 2>&1 || true

              # Move the package to dist
              if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
                mv *.pkg.tar.zst ../
                echo "✅ Created Arch package"
              else
                echo "⚠️ Failed to create package, falling back to simple conversion"
                cd ..
                # Fallback: create minimal package with .PKGINFO
                cd pkg
                cat > .PKGINFO <<EOF
          pkgname = ${pkgname}
          pkgver = ${pkgver}-1
          pkgdesc = Client de bibliothèque de jeux DRM-free
          url = https://github.com/Valt1-0/drathos
          arch = x86_64
          license = custom
          EOF
                tar --zstd -cf "../${pkgname}-${pkgver}-${arch}.pkg.tar.zst" .
                cd ..
                echo "✅ Created fallback package"
              fi

              cd ..
              rm -rf build-arch pkg "$f"
            done
          else
            echo "⚠️ No .pacman files found"
          fi

      - name: List build outputs
        shell: bash
        run: |
          if [ -d "dist" ]; then
            echo "📦 Contents of dist directory:"
            ls -lah dist/ || dir dist/
            echo ""
            echo "📊 Disk usage:"
            du -sh dist/ || echo "Could not get size"
          else
            echo "⚠️ dist directory does not exist!"
            exit 1
          fi

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Drathos-${{ matrix.platform }}-${{ github.sha }}
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Drathos-${{ matrix.platform }}-${{ github.sha }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Drathos-${{ matrix.platform }}-${{ github.sha }}
          path: |
            dist/*.deb
            dist/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
