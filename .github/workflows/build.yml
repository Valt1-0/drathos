name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libarchive-tools
          echo "✅ System dependencies installed"

      - name: Install npm dependencies
        run: |
          npm ci --legacy-peer-deps
          echo "✅ Dependencies installed"

      - name: Clean problematic files (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $nulFiles = Get-ChildItem -Path "node_modules\7zip-bin" -Filter "nul" -Recurse -ErrorAction SilentlyContinue
          foreach ($file in $nulFiles) {
            Remove-Item -Path $file.FullName -Force -ErrorAction SilentlyContinue
            Write-Host "Removed: $($file.FullName)"
          }
          if ($nulFiles.Count -eq 0) {
            Write-Host "No problematic 'nul' files found"
          }
          Write-Host "✅ Cleaned problematic files"

      - name: Clean problematic files (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          find node_modules/7zip-bin -name "nul" -type f -delete 2>/dev/null || true
          echo "✅ Cleaned problematic files"

      - name: Build application
        run: npm run dist:${{ matrix.platform }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - name: Create Arch Linux package (proper method)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          pkgname="drathos"
          pkgver="1.0.0"
          pkgrel="1"

          echo "🔄 Creating proper Arch Linux package following Arch guidelines"

          # Create package directory structure
          mkdir -p arch-pkg/pkg/usr/share/${pkgname}
          mkdir -p arch-pkg/pkg/usr/bin

          # Copy only the app resources (not electron binaries)
          cd dist
          if ls *.pacman 1> /dev/null 2>&1; then
            for f in *.pacman; do
              echo "📦 Extracting resources from $f"
              bsdtar -xf "$f" -C ../arch-pkg/extract

              # Find and copy app resources (app.asar or app/ folder + unpacked files)
              found=false
              for base_dir in "../arch-pkg/extract/usr/lib/${pkgname}/resources" \
                              "../arch-pkg/extract/opt/${pkgname}/resources" \
                              "../arch-pkg/extract/resources"; do
                if [ -d "$base_dir" ]; then
                  echo "📁 Found resources in: $base_dir"

                  # Copy app.asar if it exists
                  if [ -f "$base_dir/app.asar" ]; then
                    echo "  → Copying app.asar"
                    cp "$base_dir/app.asar" ../arch-pkg/pkg/usr/share/${pkgname}/
                  fi

                  # Copy app.asar.unpacked if it exists (contains 7zip-bin, .node files, etc.)
                  if [ -d "$base_dir/app.asar.unpacked" ]; then
                    echo "  → Copying app.asar.unpacked (native modules)"
                    cp -r "$base_dir/app.asar.unpacked" ../arch-pkg/pkg/usr/share/${pkgname}/
                  fi

                  # Copy app/ folder if no asar (fallback)
                  if [ -d "$base_dir/app" ] && [ ! -f "$base_dir/app.asar" ]; then
                    echo "  → Copying app/ folder"
                    cp -r "$base_dir/app/"* ../arch-pkg/pkg/usr/share/${pkgname}/
                  fi

                  found=true
                  break
                fi
              done

              if [ "$found" = false ]; then
                echo "⚠️ Cannot find app resources in expected locations"
                echo "Directory structure:"
                find ../arch-pkg/extract -type d -name resources | head -5
                exit 1
              fi

              # Create launcher script
              cat > ../arch-pkg/pkg/usr/bin/${pkgname} <<'LAUNCHER'
#!/bin/sh
exec electron /usr/share/drathos "$@"
LAUNCHER
              chmod +x ../arch-pkg/pkg/usr/bin/${pkgname}

              # Create .PKGINFO
              cd ../arch-pkg/pkg
              cat > .PKGINFO <<PKGINFO
pkgname = ${pkgname}
pkgver = ${pkgver}-${pkgrel}
pkgdesc = Client de bibliothèque de jeux DRM-free
url = https://github.com/Valt1-0/drathos
builddate = $(date +%s)
packager = GitHub Actions
size = $(du -sb . | cut -f1)
arch = x86_64
license = custom
depend = electron
depend = gtk3
depend = nss
depend = alsa-lib
PKGINFO

              # Create package
              echo "📦 Creating .pkg.tar.zst"
              tar --zstd -cf "../../dist/${pkgname}-${pkgver}-${pkgrel}-x86_64.pkg.tar.zst" .

              cd ../../dist
              rm -rf ../arch-pkg "$f"
              echo "✅ Created: ${pkgname}-${pkgver}-${pkgrel}-x86_64.pkg.tar.zst"
              ls -lh ${pkgname}-${pkgver}-${pkgrel}-x86_64.pkg.tar.zst
            done
          else
            echo "⚠️ No .pacman files found"
          fi

      - name: List build outputs
        shell: bash
        run: |
          if [ -d "dist" ]; then
            echo "📦 Contents of dist directory:"
            ls -lah dist/ || dir dist/
            echo ""
            echo "📊 Disk usage:"
            du -sh dist/ || echo "Could not get size"
          else
            echo "⚠️ dist directory does not exist!"
            exit 1
          fi

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Drathos-${{ matrix.platform }}-${{ github.sha }}
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Drathos-${{ matrix.platform }}-${{ github.sha }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Drathos-${{ matrix.platform }}-${{ github.sha }}
          path: |
            dist/*.deb
            dist/*.pkg.tar.zst
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
