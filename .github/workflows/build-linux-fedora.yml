name: Build Linux (Fedora/RHEL)

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build-fedora.outputs.artifact-name }}
  workflow_dispatch:

jobs:
  build-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    outputs:
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}

    steps:
      - name: Setup Fedora environment
        run: |
          dnf update -y
          dnf install -y rpm-build git nodejs npm fuse-libs libcrypt-compat

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build RPM package
        run: |
          npm run build
          npx electron-builder --linux rpm appimage
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build outputs
        run: |
          echo "Build outputs:"
          ls -lh dist/

      - name: Set output
        id: set-output
        run: echo "artifact-name=Drathos-fedora-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Drathos-fedora-${{ github.sha }}
          path: |
            dist/*.rpm
            dist/*.AppImage
          if-no-files-found: warn
          retention-days: 30
          compression-level: 9
